# =============================================================================
# Replication Edge Appliance — data plane (THIN)
# =============================================================================
# Runs beside the client's databases. Contains ONLY the data plane:
#   Kafka (1 broker, RF=1) · Schema Registry · Kafka Connect (Debezium) · Agent
#
# NOT here (stays central, reached over the Netbird mesh): Django, Celery,
# Redis, the DDL consumer, the metadata DB, all UI.
#
# Netbird runs on the HOST (systemd service / Windows service), not in compose,
# because it manages the host's network. The host service brings the mesh up,
# then writes the assigned mesh IP into .env.edge as NETBIRD_IP before this
# stack starts. Kafka advertises a listener on that IP so central can reach it.
# =============================================================================

services:

  # --- Kafka: single broker, KRaft, RF=1, short retention (edge is a relay) ---
  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: edge-kafka
    hostname: kafka
    ports:
      - "9092:9092"        # MESH listener — reachable from central at ${NETBIRD_IP}:9092
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: "broker,controller"
      KAFKA_CONTROLLER_QUORUM_VOTERS: "1@kafka:9093"
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      # Two data listeners:
      #   INTERNAL  — on-box Connect / Schema Registry talk to kafka:29092
      #   MESH      — central (DDL consumer, peek, metrics) reaches ${NETBIRD_IP}:9092
      KAFKA_LISTENERS: "INTERNAL://0.0.0.0:29092,MESH://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093"
      KAFKA_ADVERTISED_LISTENERS: "INTERNAL://kafka:29092,MESH://${NETBIRD_IP}:9092"
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "CONTROLLER:PLAINTEXT,INTERNAL:PLAINTEXT,MESH:PLAINTEXT"
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      # Single node => everything RF=1 (no fake HA on one box)
      KAFKA_DEFAULT_REPLICATION_FACTOR: 1
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
      # Edge is a relay, not an archive — keep the log small.
      KAFKA_LOG_RETENTION_HOURS: "${EDGE_KAFKA_RETENTION_HOURS:-24}"
      CLUSTER_ID: "${EDGE_CLUSTER_ID}"
      KAFKA_HEAP_OPTS: "-Xms512M -Xmx512M"
    volumes:
      - kafka-data:/var/lib/kafka/data
    networks: [edge-net]
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "kafka:29092"]
      interval: 10s
      timeout: 10s
      retries: 12
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 1G
    restart: unless-stopped
    command: >
      bash -c "
      if [ ! -f /var/lib/kafka/data/meta.properties ]; then
        kafka-storage format -t ${EDGE_CLUSTER_ID} -c /etc/kafka/kafka.properties;
      fi;
      /etc/confluent/docker/run
      "

  schema-registry:
    image: confluentinc/cp-schema-registry:7.5.0
    container_name: edge-schema-registry
    hostname: schema-registry
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "8082:8081"        # reachable from central at ${NETBIRD_IP}:8082
    environment:
      SCHEMA_REGISTRY_HOST_NAME: schema-registry
      SCHEMA_REGISTRY_KAFKASTORE_BOOTSTRAP_SERVERS: kafka:29092
      SCHEMA_REGISTRY_LISTENERS: http://0.0.0.0:8081
      SCHEMA_REGISTRY_KAFKASTORE_TOPIC: _schemas
      SCHEMA_REGISTRY_KAFKASTORE_TOPIC_REPLICATION_FACTOR: 1
    networks: [edge-net]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/"]
      interval: 10s
      timeout: 10s
      retries: 12
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 768M
    restart: unless-stopped

  # --- Same Debezium+Avro image as central; runs BOTH source & sink connectors ---
  kafka-connect:
    image: kafka-connect-debezium:latest    # built from ../../debezium-setup/Dockerfile.kafka-connect
    container_name: edge-kafka-connect
    hostname: kafka-connect
    depends_on:
      kafka:
        condition: service_healthy
      schema-registry:
        condition: service_healthy
    ports:
      - "8083:8083"        # Connect REST — central drives this at ${NETBIRD_IP}:8083
      - "8778:8778"        # Jolokia — central scrapes metrics at ${NETBIRD_IP}:8778
    environment:
      BOOTSTRAP_SERVERS: kafka:29092
      GROUP_ID: edge-connect-cluster
      CONFIG_STORAGE_TOPIC: connect-configs
      OFFSET_STORAGE_TOPIC: connect-offsets
      STATUS_STORAGE_TOPIC: connect-statuses
      CONFIG_STORAGE_REPLICATION_FACTOR: 1
      OFFSET_STORAGE_REPLICATION_FACTOR: 1
      STATUS_STORAGE_REPLICATION_FACTOR: 1
      KEY_CONVERTER: io.confluent.connect.avro.AvroConverter
      VALUE_CONVERTER: io.confluent.connect.avro.AvroConverter
      CONNECT_KEY_CONVERTER_SCHEMA_REGISTRY_URL: http://schema-registry:8081
      CONNECT_VALUE_CONVERTER_SCHEMA_REGISTRY_URL: http://schema-registry:8081
      CONNECT_PLUGIN_PATH: /kafka/connect
      KAFKA_HEAP_OPTS: "-Xms512M -Xmx1G"
    logging:
      driver: json-file
      options: { max-size: "50m", max-file: "5" }
    networks: [edge-net]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8083/"]
      interval: 10s
      timeout: 10s
      retries: 20
      start_period: 90s
    deploy:
      resources:
        limits:
          memory: 2G
    restart: unless-stopped

  # --- The Agent: registers with central, then heartbeats. No data path role. ---
  edge-agent:
    build: ./agent
    image: replication-edge-agent:latest
    container_name: edge-agent
    depends_on:
      kafka-connect:
        condition: service_healthy
    environment:
      # identity + enrollment (from .env.edge, seeded at install/first boot)
      CENTRAL_BASE_URL: "${CENTRAL_BASE_URL}"          # e.g. https://fleet.replication.internal
      APPLIANCE_UID: "${APPLIANCE_UID}"
      ENROLL_TOKEN: "${ENROLL_TOKEN}"
      NETBIRD_IP: "${NETBIRD_IP}"
      PLATFORM: "${PLATFORM:-vm_hyperv}"
      # local health probe + advertised endpoints the agent reports to central
      LOCAL_CONNECT_URL: "http://kafka-connect:8083"
      HEARTBEAT_INTERVAL_SEC: "${HEARTBEAT_INTERVAL_SEC:-30}"
      AGENT_STATE_FILE: "/state/agent.json"
    volumes:
      - agent-state:/state
    networks: [edge-net]
    restart: unless-stopped

volumes:
  kafka-data:
  agent-state:

networks:
  edge-net:
    driver: bridge
    name: edge-net
